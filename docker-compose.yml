version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mylibrary_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: mylibrary_adminer
    ports:
      - "${ADMINER_PORT}:8080"
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
